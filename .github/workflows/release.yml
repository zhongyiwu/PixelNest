name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: apple-silicon
            target: aarch64-apple-darwin
          - arch: intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "PixelNest ${{ env.RELEASE_TAG }}"
          releaseBody: "Download the DMG for your Mac, open it, then drag PixelNest into Applications. This build is not code-signed or notarized yet, so macOS may ask for a one-time right-click Open confirmation."
          prerelease: false
          retryAttempts: 2
          args: --target ${{ matrix.target }}
